---
bank_statement:
  instructions: |
    From the user prompt coming from bank statement below, extract Organizations strictly as instructed below for each item.
    Each item are separated by '|'.
    Most of the time, the pattern of an item is composed of [payment_mode, Organization, transaction_number].
    1. First, look for the Organization Entity type in the text and extract the needed information defined below:
    `id` property of each item must be alphanumeric and must be unique among the items.
    `id` property of each item is present at the beginning of each item and is an integer.
    You will be referring this property to define the relationship between entities. NEVER create new entity types that aren't mentioned below.
    name of the entity must be store under 'name' property.
    Try to detect if the entity nature is a physical person or an organisation under `nature` property
    Try to detect the transaction_number under `transaction_number` property
    Document must be summarized and stored inside Organization entity under `description` property
      Entity Types:
      label:'Organization',id:integer,name:string,nature:string,payment_mode:string,transaction_number:string,role:string,description:string //Organization Node
    2. Description property should be a crisp text summary and MUST NOT be more than 100 characters
    3. If you cannot find any information on the entities & relationships above, it is okay to return empty value. DO NOT create fictious data
    4. Extract the payment mode in under 'payment_mode' property and try to match with this list : [ card, direct_debit, transfer, paid_check ]
    the rules for extracting payment_mode to match with the list is :
      PRELEVEMENT match with direct_debit
      VIREMENT match with transfer
      VIREMENT EMIS WEB match with transfer
      CHEQUE EMIS match with paid_check
      REMBOURSEMENT DE PRET match with direct_debit.
    5. If you cannot find any information about payment mode above, it is okay to return empty value.
    6. Restrict yourself to extract only Organization information, payment_mode and transaction_number.
    7. Try to find the role according to the farming world like machinery, animals, plants...
    8. NEVER Impute missing values
      Example Output JSON:
      {{"entities": [{{"label":"Organization","id":"25","name":"Groupama","nature":"organisation","transaction_number":"FA52635,"payment_mode":"card","role":"insurance","description":"insurance fee from Groupama"}}]}}
    9. Information come from France in french language
    10. Return the entities in JSON format.
    Question: Now, extract the Organizations for the text below -
  output_schema:
    entities:
      id:
      label:
      name:
      nature:
      transaction_number:
      payment_mode:
      role:
      description:
purchase_invoice:
  instructions: |
    From the user prompt coming from purchase invoice below, extract informations strictly as instructed.
    Most of the time, the pattern of a purchase invoice is composed of supplier informations, invoice informations and one or many invoice lines.
    Information come from France in french language.
    Return the purchase informations in JSON format like an API according to the schema.
    Do not return 'description', 'type' or 'format' attributes in the response.
    Use it only to detect correct value of each attributes.
    example of a response : { supplier: { name: "AXA", address: "10 rue du Bouil bleu", postal_code: "17250", ... }, invoice: {number: "FA25632", ... }, items: [{number: '1', ... }, {number: '2', ... }, ...]}.
    for the items, try to detect the role of the item in 'merchandise' or 'service' in role attribute.
    for all the date, try to convert it in the following format : 'DD/MM/YYYY'.
    for the items, try to classify it like an accountant in nature attribute.
  output_schema:
    supplier:
      name:
        description: "Name of the supplier"
        type: string
      address:
        description: "Address of the supplier"
        type: string
      postal_code:
        description: "Postal code of the supplier"
        type: string
        format: numeric
      town:
        description: "Town of the supplier"
        type: string
      country:
        description: "Country of the supplier"
        type: string
        format: string(2)
      email:
        description: "Email of the supplier"
        type: string
        format: email
      phone_number:
        description: "phone number of the supplier"
        type: string
        format: number
      website:
        description: "website of the supplier"
        type: string
        format: url
      vat_code:
        description: "vat code number of the supplier"
        type: string
      registration_number:
        description: "unique number of the supplier"
        type: string
    invoice:
      number:
        description: "unique number of the invoice"
        type: string
      invoiced_on:
        description: "date of the invoice"
        type: string
        format: date
      total_pretax_amount:
        description: "total pretax amount of the invoice"
        type: string
        format: number
      total_amount:
        description: "total amount of the invoice"
        type: string
        format: number
      currency:
        description: "currency of the invoice"
        type: string
    items:
      number:
        description: "number or id of an invoice item"
        type: string
        format: number
      tax_rate:
        description: "tax rate of an invoice item"
        type: string
        format: number
      quantity:
        description: "quantity of an invoice item"
        type: string
        format: number
      unit_amount:
        description: "unit price with tax of an invoice item"
        type: string
        format: number
      unit_pretax_amount:
        description: "unit price without tax of an invoice item"
        type: string
        format: number
      pretax_amount:
        description: "amount without tax of an invoice item (quantity multiply by unit_pretax_amount if exist)"
        type: string
        format: number
      amount:
        description: "amount with tax of an invoice item (quantity multiply by unit_amout price if exist)"
        type: string
        format: number
      name:
        description: "name or description of an invoice item"
        type: string
        format: text
      nature:
        description: "nature, category or tag classification of an invoice item"
        type: string
        format: text
      role:
        description: "merchandise or service"
        type: string